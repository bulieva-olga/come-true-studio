<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Come True Studio | Анимационная студия</title>
        <!-- Bootstrap 5 CSS + Icons + Google Fonts -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
        <!-- Подключаем скомпилированный CSS (SASS -> CSS) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==================== HEADER / NAVBAR ==================== -->
    <header class="header">
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#home">
                    <span class="brand-icon">✦</span> Come True <span class="brand-studio">Studio</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="#home">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="#projects">Проекты</a></li>
                        <li class="nav-item"><a class="nav-link" href="#services">Услуги</a></li>
                        <li class="nav-item"><a class="nav-link" href="#about">О студии</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contact">Контакты</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
         <!-- ==================== HERO / HOME С ВИДЕО ==================== -->
        <section id="home" class="hero-section">
            <!-- Фоновое видео с петлёй -->
            <video class="hero-video" autoplay muted loop playsinline poster="https://images.pexels.com/photos/3184398/pexels-photo-3184398.jpeg?auto=compress&cs=tinysrgb&w=1600">
                <source src="постушка.mp4" type="video/mp4">
                <!-- Если видео не загрузится, браузер покажет изображение из poster -->
                Ваш браузер не поддерживает видео.
            </video>
            <!-- Тёмный градиент поверх видео для читаемости текста -->
            <div class="hero-overlay"></div>
            
            <div class="container h-100">
                <div class="row h-100 align-items-center">
                    <div class="col-lg-8 hero-content">
                        <span class="hero-badge">Анимационная студия</span>
                        <h1 class="hero-title">Твои истории<br><span class="green-gradient">оживают здесь</span></h1>
                        <p class="hero-text">Мы создаём волшебство кадр за кадром. 2D, 3D, motion-дизайн — превращаем идеи в анимацию, которая трогает сердца.</p>
                        <div class="hero-buttons">
                            <a href="#projects" class="btn btn-primary">Наши работы</a>
                            <a href="#contact" class="btn btn-outline-light">Связаться</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="hero-scroll-indicator">
                <span>Листайте вниз</span>
                <i class="bi bi-chevron-down"></i>
            </div>
        </section>
    </main>
    
     <!-- Bootstrap JS + Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main JS -->
    <script src="main.js"></script>
</body>
